version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_news
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_news_data:/var/lib/mysql
      - ./db_news.sql:/docker-entrypoint-initdb.d/db_news.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_news_data: